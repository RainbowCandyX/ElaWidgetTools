name: Build PySide6 Bindings

on:
  push:
    branches: [main]
    paths:
      - 'ElaWidgetTools/**'
      - 'bindings/**'
      - 'scripts/generate_bindings.py'
      - '.github/workflows/build-pyside6.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            qt-version: '6.10.2'
            qt-arch: 'linux_gcc_64'
            qt-subdir: 'gcc_64'
            python-version: '3.12'
          - os: windows-latest
            qt-version: '6.10.2'
            qt-arch: 'win64_msvc2022_64'
            qt-subdir: 'msvc2022_64'
            python-version: '3.12'
          - os: macos-latest
            qt-version: '6.10.2'
            qt-arch: 'clang_64'
            qt-subdir: 'macos'
            python-version: '3.12'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev libxkbcommon-x11-0 libclang-dev

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        shell: bash
        run: |
          pip install aqtinstall
          if [ "$RUNNER_OS" == "Linux" ]; then
            aqt install-qt linux desktop ${{ matrix.qt-version }} ${{ matrix.qt-arch }} -O $GITHUB_WORKSPACE/Qt
          elif [ "$RUNNER_OS" == "macOS" ]; then
            aqt install-qt mac desktop ${{ matrix.qt-version }} ${{ matrix.qt-arch }} -O $GITHUB_WORKSPACE/Qt
          elif [ "$RUNNER_OS" == "Windows" ]; then
            aqt install-qt windows desktop ${{ matrix.qt-version }} ${{ matrix.qt-arch }} -O $GITHUB_WORKSPACE/Qt
          fi

      - name: Set Qt environment
        shell: bash
        run: |
          QT_DIR="$GITHUB_WORKSPACE/Qt/${{ matrix.qt-version }}/${{ matrix.qt-subdir }}"
          echo "Qt6_DIR=$QT_DIR" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$QT_DIR" >> $GITHUB_ENV
          echo "$QT_DIR/bin" >> $GITHUB_PATH

      - name: Install PySide6 and Shiboken6
        run: pip install PySide6==6.10.2 shiboken6==6.10.2 shiboken6-generator==6.10.2

      - name: Generate typesystem
        run: python scripts/generate_bindings.py

      - name: Build ElaWidgetTools (Shared)
        shell: bash
        run: |
          cmake -S . -B build -DELAWIDGETTOOLS_BUILD_STATIC_LIB=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target ElaWidgetTools --config Release

      - name: Run Shiboken6 generator
        shell: python
        run: |
          import os, sys, subprocess, platform

          pyside6_dir = os.path.dirname(__import__('PySide6').__file__)
          shiboken6_gen_dir = os.path.dirname(__import__('shiboken6_generator').__file__)
          shiboken6_bin = os.path.join(shiboken6_gen_dir, 'shiboken6' + ('.exe' if sys.platform == 'win32' else ''))
          typesystems = os.path.join(pyside6_dir, 'typesystems')
          qt_dir = os.environ['Qt6_DIR']
          sep = ';' if sys.platform == 'win32' else ':'

          include_dirs = ['bindings', 'ElaWidgetTools',
              os.path.join(pyside6_dir, 'include'),
              os.path.join(pyside6_dir, 'include', 'QtCore'),
              os.path.join(pyside6_dir, 'include', 'QtGui'),
              os.path.join(pyside6_dir, 'include', 'QtWidgets')]

          extra_args = []
          if sys.platform == 'darwin':
              qt_fw = os.path.join(qt_dir, 'lib')
              for fw in ['QtCore', 'QtGui', 'QtWidgets']:
                  include_dirs.append(os.path.join(qt_fw, f'{fw}.framework', 'Headers'))
              extra_args.append(f'--framework-include-paths={qt_fw}')
          else:
              qt_inc = os.path.join(qt_dir, 'include')
              for mod in ['', 'QtCore', 'QtGui', 'QtWidgets']:
                  include_dirs.append(os.path.join(qt_inc, mod) if mod else qt_inc)

          if sys.platform == 'linux':
              import glob
              stddef = glob.glob('/usr/lib/gcc/**/stddef.h', recursive=True)
              if stddef:
                  extra_args.append(f'--clang-options=-isystem{os.path.dirname(stddef[0])}')

          cmd = [shiboken6_bin,
              '--generator-set=shiboken',
              '--enable-parent-ctor-heuristic',
              '--enable-return-value-heuristic',
              '--use-isnull-as-nb-bool',
              '--avoid-protected-hack',
              '--enable-pyside-extensions',
              f'--typesystem-paths={typesystems}',
              f'--include-paths={sep.join(include_dirs)}',
              *extra_args,
              '--output-directory=bindings/output',
              'bindings/global.h',
              'bindings/bindings.xml']

          print('Running:', ' '.join(cmd))
          sys.exit(subprocess.call(cmd))

      - name: Fix generated code
        shell: bash
        run: |
          GEN_DIR=bindings/output/ElaWidgetTools
          if [ -f "$GEN_DIR/elamessagebar_wrapper.cpp" ]; then
            sed -i.bak 's/::%CLASS_NAME::/::ElaMessageBar::/g' "$GEN_DIR/elamessagebar_wrapper.cpp"
          fi
          if [ -f "$GEN_DIR/elatoast_wrapper.cpp" ]; then
            sed -i.bak 's/::%CLASS_NAME::/::ElaToast::/g' "$GEN_DIR/elatoast_wrapper.cpp"
          fi
          if [ -f "$GEN_DIR/elaflowlayout_wrapper.cpp" ]; then
            sed -i.bak 's/addLayoutOwnership(cppSelf, cppArg0);/{ \/* addLayoutOwnership *\/ }/g' "$GEN_DIR/elaflowlayout_wrapper.cpp"
            sed -i.bak 's/addLayoutOwnership(cppSelf, cppResult);/{ \/* addLayoutOwnership *\/ }/g' "$GEN_DIR/elaflowlayout_wrapper.cpp"
          fi
          rm -f "$GEN_DIR"/*.bak

      - name: Compile Python bindings
        shell: python
        run: |
          import os, sys, subprocess, glob, sysconfig

          pyside6_dir = os.path.dirname(__import__('PySide6').__file__)
          shiboken6_dir = os.path.dirname(__import__('shiboken6').__file__)
          python_include = sysconfig.get_path('include')
          qt_dir = os.environ['Qt6_DIR']
          gen_dir = 'bindings/output/ElaWidgetTools'
          sources = glob.glob(os.path.join(gen_dir, '*.cpp'))

          includes = ['ElaWidgetTools', 'bindings', gen_dir, python_include,
              os.path.join(shiboken6_dir, 'include'),
              os.path.join(pyside6_dir, 'include'),
              os.path.join(pyside6_dir, 'include', 'QtCore'),
              os.path.join(pyside6_dir, 'include', 'QtGui'),
              os.path.join(pyside6_dir, 'include', 'QtWidgets')]

          # Helper: find a library file by pattern
          def find_lib(directory, pattern, exclude=None):
              files = glob.glob(os.path.join(directory, pattern))
              if exclude:
                  files = [f for f in files if exclude not in f]
              return files[0] if files else None

          if sys.platform == 'darwin':
              qt_fw = os.path.join(qt_dir, 'lib')
              lib_dir = os.path.join(os.getcwd(), 'build', 'ElaWidgetTools')
              for fw in ['QtCore', 'QtGui', 'QtWidgets']:
                  includes.append(os.path.join(qt_fw, f'{fw}.framework', 'Headers'))
              shib_dylib = find_lib(shiboken6_dir, 'libshiboken6*.dylib')
              pyside_dylib = find_lib(pyside6_dir, 'libpyside6*.dylib', exclude='qml')
              cmd = ['c++', '-std=c++17', '-shared', '-undefined', 'dynamic_lookup', '-O2', '-w']
              for i in includes: cmd += ['-I', i]
              cmd += ['-F', qt_fw, '-L', lib_dir,
                  '-lElaWidgetTools', shib_dylib, pyside_dylib,
                  f'-Wl,-rpath,{lib_dir}', f'-Wl,-rpath,{shiboken6_dir}',
                  f'-Wl,-rpath,{pyside6_dir}', f'-Wl,-rpath,{qt_fw}',
                  '-o', os.path.join(lib_dir, 'ElaWidgetTools.abi3.so')]
              cmd += sources

          elif sys.platform == 'linux':
              qt_lib = os.path.join(qt_dir, 'lib')
              qt_inc = os.path.join(qt_dir, 'include')
              lib_dir = os.path.join(os.getcwd(), 'build', 'ElaWidgetTools')
              for mod in ['', 'QtCore', 'QtGui', 'QtWidgets']:
                  includes.append(os.path.join(qt_inc, mod) if mod else qt_inc)
              shib_so = find_lib(shiboken6_dir, 'libshiboken6*.so*', exclude='Shiboken')
              pyside_so = find_lib(pyside6_dir, 'libpyside6*.so*', exclude='qml')
              cmd = ['c++', '-std=c++17', '-shared', '-fPIC', '-O2', '-w']
              for i in includes: cmd += ['-I', i]
              cmd += ['-L', lib_dir, '-L', qt_lib,
                  '-lElaWidgetTools', shib_so, pyside_so,
                  '-Wl,-rpath,$ORIGIN', f'-Wl,-rpath,{shiboken6_dir}',
                  f'-Wl,-rpath,{pyside6_dir}', f'-Wl,-rpath,{qt_lib}',
                  '-o', os.path.join(lib_dir, 'ElaWidgetTools.abi3.so')]
              cmd += sources

          elif sys.platform == 'win32':
              qt_inc = os.path.join(qt_dir, 'include')
              qt_lib = os.path.join(qt_dir, 'lib')
              lib_dir = os.path.join('build', 'ElaWidgetTools', 'Release')
              python_lib_dir = os.path.join(os.path.dirname(sys.executable), 'libs')
              for mod in ['', 'QtCore', 'QtGui', 'QtWidgets']:
                  includes.append(os.path.join(qt_inc, mod) if mod else qt_inc)
              inc_flags = []
              for i in includes: inc_flags += [f'/I{i}']
              out_file = os.path.join(lib_dir, 'ElaWidgetTools.pyd')
              cmd = ['cl.exe', '/std:c++17', '/Zc:__cplusplus', '/permissive-', '/O2', '/EHsc', '/MD', '/LD', '/w',
                  *inc_flags, *sources,
                  '/link',
                  f'/LIBPATH:{lib_dir}', f'/LIBPATH:{shiboken6_dir}', f'/LIBPATH:{pyside6_dir}', f'/LIBPATH:{qt_lib}', f'/LIBPATH:{python_lib_dir}',
                  'ElaWidgetTools.lib', 'shiboken6.abi3.lib', 'pyside6.abi3.lib',
                  f'/OUT:{out_file}']

          print('Running:', ' '.join(cmd[:10]), '...', f'({len(sources)} sources)')
          sys.exit(subprocess.call(cmd))

      - name: Test import
        shell: python
        run: |
          import os, sys, subprocess
          if sys.platform == 'win32':
              lib_dir = os.path.join(os.getcwd(), 'build', 'ElaWidgetTools', 'Release')
          else:
              lib_dir = os.path.join(os.getcwd(), 'build', 'ElaWidgetTools')
          qt_dir = os.environ['Qt6_DIR']
          env = os.environ.copy()
          if sys.platform == 'linux':
              env['LD_LIBRARY_PATH'] = f"{lib_dir}:{qt_dir}/lib:{env.get('LD_LIBRARY_PATH', '')}"
          elif sys.platform == 'win32':
              env['PATH'] = f"{lib_dir};{qt_dir}\\bin;{env.get('PATH', '')}"
          sys.exit(subprocess.call([sys.executable, '-c', '''
          from PySide6.QtWidgets import QApplication
          import ElaWidgetTools
          classes = [x for x in dir(ElaWidgetTools) if x.startswith("Ela")]
          print(f"Loaded {len(classes)} symbols")
          print("Sample:", classes[:10])
          '''], cwd=lib_dir, env=env))

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ElaWidgetTools-PySide6-${{ matrix.os }}
          path: |
            build/ElaWidgetTools/libElaWidgetTools.*
            build/ElaWidgetTools/ElaWidgetTools.*
            build/ElaWidgetTools/Release/ElaWidgetTools.*
          retention-days: 30
